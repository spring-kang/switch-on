spring:
  application:
    name: switch-on

  # PostgreSQL Database (Railway)
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  # H2 Console 비활성화
  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}

# JWT 설정
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

# CORS 설정
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
