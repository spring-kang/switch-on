spring:
  application:
    name: switch-on

  # H2 Database (개발용)
  datasource:
    url: jdbc:h2:mem:switchon
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# JWT 설정
jwt:
  secret: switch-on-secret-key-for-jwt-token-generation-must-be-at-least-256-bits
  expiration: 86400000  # 24시간
